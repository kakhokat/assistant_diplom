worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    server_tokens off;

    proxy_http_version 1.1;
    proxy_connect_timeout 5s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    client_max_body_size 50m;

    map $http_x_request_id $req_id {
        default $http_x_request_id;
        ""      $request_id;
    }

    map $request_method $is_trace_method {
        default 0;
        TRACE   1;
    }

    log_format main
        '$remote_addr - $remote_user [$time_local] "$request" '
        '$status $body_bytes_sent "$http_referer" "$http_user_agent" '
        'rt=$request_time uct=$upstream_connect_time '
        'uht=$upstream_header_time urt=$upstream_response_time '
        'rid=$req_id client_rid=$http_x_request_id upstream_addr=$upstream_addr';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    upstream async_upstream {
        server async_nginx:80;
    }

    upstream auth_upstream {
        server auth_api:8000;
    }

    upstream ugc_upstream {
        server ugc_nginx:80;
    }

    upstream assistant_upstream {
        server assistant_api:8003;
    }

    upstream frontend_upstream {
        server frontend_demo:80;
    }

    server {
        listen 80;
        server_name _;

        if ($is_trace_method) {
            return 405;
        }

        add_header X-Request-Id $req_id always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;

        location = /_health {
            limit_except GET HEAD { deny all; }

            add_header Content-Type text/plain always;
            add_header X-Request-Id $req_id always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
            add_header Cross-Origin-Opener-Policy "same-origin" always;

            return 200 "ok
";
        }

        location /api/v1/auth/ {
            proxy_pass http://auth_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Request-Id $req_id;
            proxy_hide_header X-Powered-By;
        }

        location /ugc/ {
            proxy_pass http://ugc_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Request-Id $req_id;
            proxy_hide_header X-Powered-By;
        }

        location = /health {
            proxy_pass http://ugc_upstream/health;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Request-Id $req_id;
            proxy_hide_header X-Powered-By;
        }


        location /demo/ {
            proxy_pass http://frontend_upstream/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Request-Id $req_id;
            proxy_hide_header X-Powered-By;

            add_header X-Request-Id $req_id always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Permissions-Policy "camera=(), microphone=(self), geolocation=()" always;
            add_header Cross-Origin-Opener-Policy "same-origin" always;
        }


        location /assistant/ {
            proxy_pass http://assistant_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Request-Id $req_id;
            proxy_set_header Authorization $http_authorization;
            proxy_hide_header X-Powered-By;
        }

        location ^~ /api/openapi {
            proxy_pass http://async_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Request-Id $req_id;
            proxy_hide_header X-Powered-By;
        }

        location /api/v1/ {
            proxy_pass http://async_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Request-Id $req_id;
            proxy_hide_header X-Powered-By;
        }

        location = / {
            limit_except GET HEAD { deny all; }

            add_header Content-Type text/plain always;
            add_header X-Request-Id $req_id always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
            add_header Cross-Origin-Opener-Policy "same-origin" always;

            return 200 "cinema-platform gateway

Endpoints:
  /api/v1/
  /api/v1/auth/
  /ugc/
  /assistant/
  /demo/
  /_health
";
        }
    }
}
